<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<!-- Window title doubles as a process handle: start-desk.cmd/.sh closes this
     window by matching on this exact title once the real Desk is ready. Keep
     the title text and the taskkill/pkill match in runtime-launchers.js in sync.
     Plain ASCII on purpose (see SPLASH_TITLE comment in runtime-launchers.js). -->
<title>Rewards Desk - Loading</title>
<!-- Same icon file the real Desk window uses (assets/logo.ico) — Chromium's --app
     mode uses the page favicon as the window/taskbar icon, so this keeps the
     splash and the real Desk showing the same icon instead of a generic one. -->
<link rel="icon" href="../../assets/logo.ico">
<style>
  html, body {
    margin: 0; padding: 0; width: 100%; height: 100%;
    background: #03080f; color: #e8f4ff;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    -webkit-user-select: none; user-select: none;
  }
  .wrap { text-align: center; }
  img.logo {
    width: 84px; height: 84px; margin-bottom: 18px;
    filter: drop-shadow(0 0 24px rgba(46, 232, 255, .25));
  }
  h1 { font-size: 15px; font-weight: 700; margin: 0 0 4px; letter-spacing: .01em; }
  p { font-size: 12px; color: #6e92b8; margin: 0 0 20px; }
  .bar {
    width: 220px; height: 4px; border-radius: 999px;
    background: rgba(255,255,255,.08); overflow: hidden; margin: 0 auto;
  }
  .bar-fill {
    width: 40%; height: 100%; border-radius: 999px;
    background: linear-gradient(90deg, #1e9bff, #2ee8ff);
    animation: slide 1.1s ease-in-out infinite;
  }
  @keyframes slide {
    0%   { transform: translateX(-100%); }
    100% { transform: translateX(350%); }
  }
</style>
</head>
<body>
  <div class="wrap">
    <img class="logo" src="../../assets/logo.png" alt="">
    <h1>Rewards Desk</h1>
    <p>Preparing — checking for updates…</p>
    <div class="bar"><div class="bar-fill"></div></div>
  </div>
  <script>
    // Looks less like "a website" while it's up — no right-click menu, no
    // selecting/dragging the logo, no accidental text selection on the label.
    document.addEventListener('contextmenu', function (e) { e.preventDefault(); });
    document.addEventListener('dragstart', function (e) { e.preventDefault(); });
  </script>
</body>
</html>
